name: Build and publish a Wasm Component to GitHub Artifacts

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish"
        required: true
        type: string

env:
  IMAGE_NAME: ${{ github.repository }}
  COMPONENT_NAME: wordmark
  COMPONENT_DESCRIPTION: "Convert between Markdown and Word documents"
  COMPONENT_SOURCE: "https://github.com/yoshuawuyts/components"
  COMPONENT_HOMEPAGE: "https://github.com/yoshuawuyts/components"
  COMPONENT_LICENSES: "Apache-2.0"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      attestations: write
      packages: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@v1.10.15

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache cargo bin
        id: cache-cargo
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin
          key: ${{ runner.os }}-cargo-bin
          restore-keys: |
            ${{ runner.os }}-cargo-bin

      - if: ${{ steps.cache-cargo.outputs.cache-hit != 'true' }}
        name: Install build dependencies
        continue-on-error: false
        run: |
          cargo binstall wkg --force

      - name: Add wasm32-wasip2 target
        run: rustup target add wasm32-wasip2

      - name: Build the component
        run: cargo build -p wordmark --release --target wasm32-wasip2

      - name: Normalize COMPONENT_NAME and Append .wasm
        run: echo "COMPONENT_NAME_UNDERSCORED=${COMPONENT_NAME//-/_}.wasm" >> $GITHUB_ENV

      - name: Publish `:<version>` to GitHub Container Registry
        id: publish_versioned
        uses: bytecodealliance/wkg-github-action@v5
        with:
          file: target/wasm32-wasip2/release/${{ env.COMPONENT_NAME_UNDERSCORED }}
          oci-reference-without-tag: ghcr.io/${{ env.IMAGE_NAME }}/${{ env.COMPONENT_NAME }}
          version: ${{ inputs.version }}
          description: ${{ env.COMPONENT_DESCRIPTION }}
          source: ${{ env.COMPONENT_SOURCE }}
          homepage: ${{ env.COMPONENT_HOMEPAGE }}
          licenses: ${{ env.COMPONENT_LICENSES }}

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/${{ env.IMAGE_NAME }}/${{ env.COMPONENT_NAME }}
          subject-digest: ${{ steps.publish_versioned.outputs.digest }}
          push-to-registry: true
